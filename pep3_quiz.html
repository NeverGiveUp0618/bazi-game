<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三年级英语单词练习</title>
<style>
:root {
  --purple: #764ba2;
  --purple-light: #ede7f6;
  --green: #43a047;
  --red: #e53935;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Microsoft YaHei', Arial, sans-serif;
  background: linear-gradient(160deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 12px 32px;
}
h1 {
  color: white;
  font-size: 1.4rem;
  margin-bottom: 4px;
  text-shadow: 0 2px 4px rgba(0,0,0,.3);
}
.subtitle { color: rgba(255,255,255,.8); font-size: .82rem; margin-bottom: 14px; }

/* Mode tabs */
.mode-btns {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  width: 100%;
  max-width: 480px;
}
.mode-btn {
  flex: 1;
  padding: 10px 0;
  border: 2px solid rgba(255,255,255,.7);
  background: rgba(255,255,255,.15);
  color: white;
  border-radius: 22px;
  cursor: pointer;
  font-size: .95rem;
  font-family: inherit;
  transition: all .2s;
}
.mode-btn.active {
  background: white;
  color: var(--purple);
  font-weight: bold;
  border-color: white;
}

/* Card */
.card {
  background: white;
  border-radius: 20px;
  padding: 20px 16px 18px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 8px 32px rgba(0,0,0,.25);
}

/* ── SPELL ── */
.spell-cat {
  display: inline-block;
  background: var(--purple-light);
  color: var(--purple);
  border-radius: 10px;
  padding: 3px 14px;
  font-size: .8rem;
  margin-bottom: 10px;
}
.spell-zh {
  font-size: 2.4rem;
  font-weight: bold;
  color: #3d3d7a;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: 2px;
}
.spell-hint { color: #aaa; font-size: .82rem; text-align: center; margin-bottom: 18px; }

/* Fake letter boxes + hidden real input */
.letter-display {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
  cursor: text;
}
.letter-cell {
  width: 40px;
  height: 48px;
  border-radius: 8px;
  border: 2px solid #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  font-weight: bold;
  color: #333;
  transition: border .15s, background .15s;
  position: relative;
}
.letter-cell.active {
  border-color: var(--purple);
  box-shadow: 0 0 0 3px rgba(118,75,162,.18);
}
.letter-cell.active::after {
  content: '';
  display: block;
  width: 2px;
  height: 60%;
  background: var(--purple);
  animation: blink .8s step-end infinite;
  position: absolute;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.letter-cell.correct { border-color: var(--green); background: #e8f5e9; color: #2e7d32; }
.letter-cell.wrong   { border-color: var(--red);   background: #ffebee; color: #b71c1c; }

.hidden-input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  width: 1px;
  height: 1px;
  top: -999px;
}

.spell-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-size: .92rem;
  font-family: inherit;
  font-weight: 600;
  transition: all .15s;
  min-height: 42px;
}
.btn-primary   { background: var(--purple); color: white; }
.btn-secondary { background: #eee; color: #555; }
.btn-success   { background: var(--green); color: white; }
.btn-warn      { background: #ff8f00; color: white; }

.spell-result {
  text-align: center;
  font-size: 1.05rem;
  font-weight: bold;
  min-height: 28px;
  margin-bottom: 4px;
}
.result-ok  { color: var(--green); }
.result-err { color: var(--red); }

.score-bar {
  display: flex;
  justify-content: space-around;
  align-items: center;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid #eee;
  font-size: .85rem;
  color: #999;
}
.score-bar b { color: var(--purple); font-size: 1rem; }

/* ── MATCH ── */
.match-tip {
  text-align: center;
  color: #999;
  font-size: .83rem;
  margin-bottom: 14px;
}
.match-area {
  display: flex;
  align-items: stretch;
  gap: 0;
}
.match-col {
  display: flex;
  flex-direction: column;
  gap: 9px;
  flex: 1;
  min-width: 0;
}
.match-col-en { align-items: flex-end; }
.match-col-zh { align-items: flex-start; }
.match-svg-wrap {
  width: 56px;
  flex-shrink: 0;
  position: relative;
}
.match-svg-wrap svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  overflow: visible;
}
.match-item {
  padding: 8px 10px;
  border: 2px solid #ccc;
  border-radius: 12px;
  cursor: pointer;
  font-size: .88rem;
  background: #fafafa;
  transition: all .15s;
  user-select: none;
  text-align: center;
  width: 100%;
  word-break: break-word;
  line-height: 1.3;
}
.match-item:active { transform: scale(.97); }
.match-item.sel  { border-color: var(--purple); background: var(--purple-light); font-weight: bold; }
.match-item.ok   { border-color: var(--green); background: #e8f5e9; color: #2e7d32; pointer-events: none; }
.match-item.err  { border-color: var(--red);   background: #ffebee; color: #b71c1c; }

.match-actions {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.match-score-bar {
  text-align: center;
  margin-top: 10px;
  color: #aaa;
  font-size: .84rem;
}
.match-score-bar b { color: var(--purple); }
</style>
</head>
<body>

<h1>🌟 三年级英语练习</h1>
<p class="subtitle">人教版 PEP · Grade 3</p>

<div class="mode-btns">
  <button class="mode-btn active" id="btn-spell" onclick="setMode('spell')">✏️ 拼写练习</button>
  <button class="mode-btn"        id="btn-match" onclick="setMode('match')">🔗 英中连线</button>
</div>

<div class="card" id="card"></div>

<!-- hidden keyboard input -->
<input class="hidden-input" id="ghost" type="text"
  autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  inputmode="latin"
  oninput="onGhostInput()"
  onkeydown="onGhostKey(event)"
  onblur="onGhostBlur()">

<script>
// ── Vocabulary ──────────────────────────────────────────────
const WORDS = [
  {en:'red',zh:'红色',cat:'颜色'},{en:'blue',zh:'蓝色',cat:'颜色'},
  {en:'green',zh:'绿色',cat:'颜色'},{en:'yellow',zh:'黄色',cat:'颜色'},
  {en:'white',zh:'白色',cat:'颜色'},{en:'black',zh:'黑色',cat:'颜色'},
  {en:'orange',zh:'橙色',cat:'颜色'},{en:'pink',zh:'粉色',cat:'颜色'},
  {en:'purple',zh:'紫色',cat:'颜色'},{en:'brown',zh:'棕色',cat:'颜色'},
  {en:'one',zh:'一',cat:'数字'},{en:'two',zh:'二',cat:'数字'},
  {en:'three',zh:'三',cat:'数字'},{en:'four',zh:'四',cat:'数字'},
  {en:'five',zh:'五',cat:'数字'},{en:'six',zh:'六',cat:'数字'},
  {en:'seven',zh:'七',cat:'数字'},{en:'eight',zh:'八',cat:'数字'},
  {en:'nine',zh:'九',cat:'数字'},{en:'ten',zh:'十',cat:'数字'},
  {en:'cat',zh:'猫',cat:'动物'},{en:'dog',zh:'狗',cat:'动物'},
  {en:'bird',zh:'鸟',cat:'动物'},{en:'fish',zh:'鱼',cat:'动物'},
  {en:'panda',zh:'熊猫',cat:'动物'},{en:'monkey',zh:'猴子',cat:'动物'},
  {en:'rabbit',zh:'兔子',cat:'动物'},{en:'duck',zh:'鸭子',cat:'动物'},
  {en:'pig',zh:'猪',cat:'动物'},{en:'elephant',zh:'大象',cat:'动物'},
  {en:'pencil',zh:'铅笔',cat:'文具'},{en:'pen',zh:'钢笔',cat:'文具'},
  {en:'book',zh:'书',cat:'文具'},{en:'bag',zh:'书包',cat:'文具'},
  {en:'ruler',zh:'尺子',cat:'文具'},{en:'eraser',zh:'橡皮',cat:'文具'},
  {en:'desk',zh:'桌子',cat:'文具'},{en:'chair',zh:'椅子',cat:'文具'},
  {en:'father',zh:'父亲',cat:'家庭'},{en:'mother',zh:'母亲',cat:'家庭'},
  {en:'brother',zh:'兄弟',cat:'家庭'},{en:'sister',zh:'姐妹',cat:'家庭'},
  {en:'grandfather',zh:'爷爷',cat:'家庭'},{en:'grandmother',zh:'奶奶',cat:'家庭'},
  {en:'apple',zh:'苹果',cat:'食物'},{en:'banana',zh:'香蕉',cat:'食物'},
  {en:'milk',zh:'牛奶',cat:'食物'},{en:'water',zh:'水',cat:'食物'},
  {en:'rice',zh:'米饭',cat:'食物'},{en:'bread',zh:'面包',cat:'食物'},
  {en:'eye',zh:'眼睛',cat:'身体'},{en:'ear',zh:'耳朵',cat:'身体'},
  {en:'nose',zh:'鼻子',cat:'身体'},{en:'mouth',zh:'嘴巴',cat:'身体'},
  {en:'hand',zh:'手',cat:'身体'},{en:'foot',zh:'脚',cat:'身体'},
  {en:'head',zh:'头',cat:'身体'},
  {en:'coat',zh:'外套',cat:'衣物'},{en:'shirt',zh:'衬衫',cat:'衣物'},
  {en:'skirt',zh:'裙子',cat:'衣物'},{en:'hat',zh:'帽子',cat:'衣物'},
  {en:'shoes',zh:'鞋子',cat:'衣物'},{en:'pants',zh:'裤子',cat:'衣物'},
  {en:'run',zh:'跑',cat:'动作'},{en:'jump',zh:'跳',cat:'动作'},
  {en:'swim',zh:'游泳',cat:'动作'},{en:'fly',zh:'飞',cat:'动作'},
  {en:'walk',zh:'走',cat:'动作'},{en:'eat',zh:'吃',cat:'动作'},
  {en:'drink',zh:'喝',cat:'动作'},{en:'read',zh:'阅读',cat:'动作'},
  {en:'write',zh:'写',cat:'动作'},{en:'play',zh:'玩耍',cat:'动作'},
];

function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pick(n){ return shuffle(WORDS).slice(0,n); }

// ── Global state ─────────────────────────────────────────────
let mode = 'spell';

// Spell state
let SW = null, spellChecked = false, spellScore = {ok:0,total:0};
let ghostActive = false;

// Match state
let MW=[], menSel=null, mzhSel=null, mLines=[], mEnOrd=[], mZhOrd=[], mScore={ok:0,total:0};

// ── Mode switch ──────────────────────────────────────────────
function setMode(m){
  mode = m;
  document.getElementById('btn-spell').classList.toggle('active', m==='spell');
  document.getElementById('btn-match').classList.toggle('active', m==='match');
  closeGhost();
  if(m==='spell'){ spellScore={ok:0,total:0}; newSpell(); }
  else           { mScore={ok:0,total:0}; newMatch(); }
}

// ════════════════════════════════════════
//  SPELL MODE
// ════════════════════════════════════════
function newSpell(){
  SW = WORDS[Math.floor(Math.random()*WORDS.length)];
  spellChecked = false;
  renderSpell('');
}

function renderSpell(currentInput, result){
  const w = SW;
  const len = w.en.length;
  const cells = Array.from({length:len},(_,i)=>{
    const ch = currentInput[i] || '';
    let cls = 'letter-cell';
    if(result==='checking'||result==='shown'){
      const correct = w.en[i];
      if(!ch || ch!==correct) cls+=' wrong';
      else cls+=' correct';
    } else if(ghostActive && i===currentInput.length && !result){
      cls += ' active';
    }
    return `<div class="${cls}">${
      result==='checking'||result==='shown'
        ? `<span>${w.en[i]}</span>`
        : ch ? `<span>${ch}</span>` : ''
    }</div>`;
  }).join('');

  let resultHtml = '';
  if(result==='checking'){
    const ok = currentInput===w.en;
    resultHtml = ok
      ? `<div class="spell-result result-ok">🎉 正确！棒棒的！</div>`
      : `<div class="spell-result result-err">❌ 正确答案：<b>${w.en}</b></div>`;
  } else if(result==='shown'){
    resultHtml = `<div class="spell-result" style="color:#aaa">答案：<b>${w.en}</b></div>`;
  } else {
    resultHtml = `<div class="spell-result"></div>`;
  }

  const tot = spellScore.total, ok = spellScore.ok;
  document.getElementById('card').innerHTML = `
    <div style="text-align:center">
      <div class="spell-cat">${w.cat}</div>
    </div>
    <div class="spell-zh">${w.zh}</div>
    <div class="spell-hint">共 ${len} 个字母，点击方格开始输入</div>
    <div class="letter-display" id="letter-display" onclick="focusGhost()">${cells}</div>
    ${resultHtml}
    <div class="spell-actions">
      <button class="btn btn-primary"   onclick="checkSpell()">✅ 检查</button>
      <button class="btn btn-secondary" onclick="showSpellAnswer()">👁 答案</button>
      <button class="btn btn-secondary" onclick="newSpell()">⏭ 下一题</button>
    </div>
    <div class="score-bar">
      <span>做了 <b>${tot}</b> 题</span>
      <span>对了 <b>${ok}</b> 题</span>
      <span>正确率 <b>${tot?Math.round(100*ok/tot)+'%':'--'}</b></span>
    </div>
  `;
}

function focusGhost(){
  if(spellChecked) return;
  const g = document.getElementById('ghost');
  g.value = ghostVal;
  g.focus();
  ghostActive = true;
  renderSpell(ghostVal);
}

function closeGhost(){
  ghostActive = false;
  document.getElementById('ghost').blur();
}

let ghostVal = '';

function onGhostInput(){
  if(spellChecked) return;
  const g = document.getElementById('ghost');
  const raw = g.value.replace(/[^a-zA-Z]/g,'').toLowerCase().slice(0, SW.en.length);
  ghostVal = raw;
  g.value = raw;
  renderSpell(raw);
}

function onGhostKey(e){
  if(e.key==='Enter'){ e.preventDefault(); checkSpell(); }
}

function onGhostBlur(){
  ghostActive = false;
  renderSpell(ghostVal);
}

function checkSpell(){
  if(spellChecked) return;
  spellChecked = true;
  closeGhost();
  spellScore.total++;
  if(ghostVal===SW.en) spellScore.ok++;
  renderSpell(ghostVal, 'checking');
  ghostVal = '';
}

function showSpellAnswer(){
  if(!spellChecked){ spellScore.total++; spellChecked=true; }
  closeGhost();
  renderSpell(SW.en, 'shown');
  ghostVal = '';
}

// ════════════════════════════════════════
//  MATCH MODE
// ════════════════════════════════════════
function newMatch(){
  MW = pick(6);
  menSel=null; mzhSel=null; mLines=[];
  mEnOrd = shuffle([...Array(MW.length).keys()]);
  mZhOrd = shuffle([...Array(MW.length).keys()]);
  renderMatch();
}

function renderMatch(){
  const n = MW.length;

  const enItems = mEnOrd.map(wi=>{
    const ln = mLines.find(l=>l.ei===wi);
    let cls='match-item';
    if(ln) cls += ln.correct===undefined?'':ln.correct?' ok':' err';
    if(!ln && menSel===wi) cls+=' sel';
    return `<div class="${cls}" id="me${wi}" onclick="selEn(${wi})">${MW[wi].en}</div>`;
  }).join('');

  const zhItems = mZhOrd.map(wi=>{
    const ln = mLines.find(l=>l.zi===wi);
    let cls='match-item';
    if(ln) cls += ln.correct===undefined?'':ln.correct?' ok':' err';
    if(!ln && mzhSel===wi) cls+=' sel';
    return `<div class="${cls}" id="mz${wi}" onclick="selZh(${wi})">${MW[wi].zh}</div>`;
  }).join('');

  const matched = mLines.length;
  const correct = mLines.filter(l=>l.correct).length;

  document.getElementById('card').innerHTML = `
    <p class="match-tip">点击左侧英文 → 点击右侧中文 完成连线</p>
    <div class="match-area">
      <div class="match-col match-col-en">${enItems}</div>
      <div class="match-svg-wrap" id="msvgwrap"><svg id="msvg"></svg></div>
      <div class="match-col match-col-zh">${zhItems}</div>
    </div>
    <div class="match-score-bar">已连 <b>${matched}</b>/${n}，正确 <b>${correct}</b> 对</div>
    <div class="match-actions">
      <button class="btn btn-secondary" onclick="clearWrong()">🗑 清错误</button>
      <button class="btn btn-success"   onclick="checkMatch()">✅ 检查</button>
      <button class="btn btn-primary"   onclick="newMatch()">🔀 换一组</button>
    </div>
  `;
  requestAnimationFrame(drawLines);
}

function getCenter(id){
  const wrap = document.getElementById('msvgwrap');
  const el   = document.getElementById(id);
  if(!el||!wrap) return null;
  const er = el.getBoundingClientRect();
  const wr = wrap.getBoundingClientRect();
  return {
    x: id.startsWith('me') ? er.right-wr.left : er.left-wr.left,
    y: (er.top+er.bottom)/2 - wr.top
  };
}

function drawLines(){
  const svg  = document.getElementById('msvg');
  const wrap = document.getElementById('msvgwrap');
  if(!svg||!wrap) return;
  svg.setAttribute('height', wrap.offsetHeight || 300);
  svg.innerHTML = mLines.map(l=>{
    const p1=getCenter('me'+l.ei), p2=getCenter('mz'+l.zi);
    if(!p1||!p2) return '';
    const color = l.correct===undefined?'#b0b0b0':l.correct?'#43a047':'#e53935';
    const mx=(p1.x+p2.x)/2;
    return `<path d="M${p1.x},${p1.y} C${mx},${p1.y} ${mx},${p2.y} ${p2.x},${p2.y}"
      stroke="${color}" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
  }).join('');
}

function selEn(wi){
  const ln=mLines.find(l=>l.ei===wi);
  if(ln&&ln.correct) return;
  menSel = menSel===wi ? null : wi;
  tryPair(); renderMatch();
}
function selZh(wi){
  const ln=mLines.find(l=>l.zi===wi);
  if(ln&&ln.correct) return;
  mzhSel = mzhSel===wi ? null : wi;
  tryPair(); renderMatch();
}
function tryPair(){
  if(menSel===null||mzhSel===null) return;
  const ei=menSel, zi=mzhSel;
  mLines = mLines.filter(l=>!(l.ei===ei||l.zi===zi)||l.correct);
  mLines.push({ei,zi});
  menSel=null; mzhSel=null;
}
function checkMatch(){
  mLines = mLines.map(l=>({...l, correct: l.ei===l.zi}));
  const ok=mLines.filter(l=>l.correct).length;
  mScore.ok+=ok; mScore.total+=mLines.length;
  renderMatch();
  if(ok===MW.length) setTimeout(()=>alert('🎉 全对啦！超棒！'),120);
}
function clearWrong(){
  mLines = mLines.filter(l=>l.correct===true);
  renderMatch();
}

window.addEventListener('resize', ()=>{ if(mode==='match') requestAnimationFrame(drawLines); });

// ── Init ─────────────────────────────────────────────────────
ghostVal = '';
newSpell();
</script>
</body>
</html>
